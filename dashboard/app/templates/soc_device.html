<!DOCTYPE html>
<html>

<head>
    <title>SOC Device View</title>
</head>

<body>

  <h1>🔍 SOC Device View</h1>
  <h2 id="deviceKey">{{ device.key }}</h2>

  <!-- QUICK ACTIONS -->
  <div style="margin:16px 0; display:flex; gap:12px;">
    <button onclick="inspectDevice()">🔎 Inspect</button>
    <button onclick="allowDevice()" style="color:#3ddc97;">✅ Allow</button>
    <button onclick="blockDevice()" style="color:#ff6b6b;">⛔ Block</button>
  </div>

  <h3>📌 Device Details</h3>
  <ul id="details"></ul>

  <h3>🧠 Live Predictions</h3>
  <ul id="predictions"></ul>

  <a href="/dashboard">⬅ Back</a>


    <script>
        const deviceKey = "{{ device.key }}";
        
        async function refreshDevice() {
            const res = await fetch("/api/state");
            const data = await res.json();
            const d = data.devices.find(x => x.key === deviceKey);
            if (!d) return;

            document.getElementById("details").innerHTML = `
      <li>Status: ${d.status}</li>
      <li>IP: ${d.ip}</li>
      <li>MAC: ${d.mac || "unknown"}</li>
      <li>Last Seen: ${new Date(d.last_seen * 1000).toLocaleString()}</li>
    `;
        }

        async function refreshPredictions() {
            const res = await fetch(`/api/predictions/${encodeURIComponent(deviceKey)}`);
            const data = await res.json();

            const list = document.getElementById("predictions");
            list.innerHTML = "";

            data.predictions.slice().reverse().forEach(p => {
                const li = document.createElement("li");
                li.innerHTML = `
          <b>${p.decision}</b>
          (score: ${p.score.toFixed(2)})<br>
          <small>${new Date(p.ts * 1000).toLocaleString()}</small>
        `;
                list.appendChild(li);
            });
        }
        
        refreshDevice();
        refreshPredictions();
        setInterval(refreshDevice, 3000);
        setInterval(refreshPredictions, 3000);
    </script>

</body>

</html>

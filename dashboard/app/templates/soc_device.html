<!DOCTYPE html>
<html>

<head>
    <title>SOC Device View</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <h1>🔍 SOC Device View</h1>

    <ul id="details"></ul>

    <a href="/dashboard">⬅ Back</a>

    <script>
        const deviceKey = "{{ device.key }}";

        async function refreshDevice() {
            const res = await fetch("/api/state");
            const data = await res.json();

            const device = data.devices.find(d => d.key === deviceKey);
            if (!device) return;

            document.getElementById("details").innerHTML = `
      <li><strong>Key:</strong> ${device.key}</li>
      <li><strong>Status:</strong> ${device.status}</li>
      <li><strong>IP:</strong> ${device.ip}</li>
      <li><strong>MAC:</strong> ${device.mac || "unknown"}</li>
      <li><strong>Last Seen:</strong> ${new Date(device.last_seen * 1000).toLocaleString()}</li>`;
        }

        refreshDevice();
        setInterval(refreshDevice, 3000);
    </script>

</body>

</html>

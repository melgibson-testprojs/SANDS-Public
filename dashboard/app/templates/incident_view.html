<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidents | SANDS SOC</title>
    <link rel="stylesheet" href="/static/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-main: #0c0f14;
            --bg-canvas: #0f131a;
            --card-bg: rgba(21, 26, 35, 0.8);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #e8ebf1;
            --text-muted: #9aa3b2;
            --accent-blue: #4f8cff;
            --accent-green: #3ddc97;
            --accent-yellow: #f6c343;
            --accent-red: #ff6b6b;
            --accent-purple: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 32px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            animation: fadeInDown 0.6s ease-out;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        h1 span {
            color: var(--accent-blue);
        }

        .back-btn {
            background: var(--glass-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-4px);
            border-color: var(--accent-blue);
        }

        /* Controls Section */
        .controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            margin-bottom: 24px;
            animation: fadeIn 0.8s ease-out;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 14px 20px 14px 48px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .filters {
            display: flex;
            gap: 12px;
        }

        .filter-select {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
        }

        .filter-select:hover {
            border-color: var(--text-muted);
        }

        /* Table Section */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            backdrop-filter: blur(12px);
            animation: fadeInUp 0.8s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            padding: 18px 24px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 11px;
            border-bottom: 1px solid var(--card-border);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s ease;
        }

        th:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        th.sort-active {
            color: var(--accent-blue);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--card-border);
            vertical-align: middle;
            transition: background 0.2s ease;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .ts-col {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-muted);
            width: 220px;
        }

        .source-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .source-agent {
            background: rgba(79, 140, 255, 0.15);
            color: var(--accent-blue);
        }

        .source-ids {
            background: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
        }

        .source-server {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
        }

        .severity-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 12px;
        }

        .sev-warning {
            color: var(--accent-yellow);
        }

        .sev-error {
            color: var(--accent-red);
        }

        .sev-critical {
            color: var(--accent-red);
            font-weight: 700;
        }

        .category-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .cat-network {
            background: var(--accent-blue);
        }

        .cat-swarm {
            background: var(--accent-purple);
        }

        .cat-system {
            background: var(--text-muted);
        }

        .cat-detection {
            background: var(--accent-yellow);
        }

        .cat-error {
            background: var(--accent-red);
        }

        /* Swarm Specific UI */
        .swarm-details {
            margin-top: 12px;
            padding: 16px;
            background: rgba(168, 85, 247, 0.05);
            border-left: 3px solid var(--accent-purple);
            border-radius: 0 8px 8px 0;
        }

        .swarm-lifecycle {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .swarm-step {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
        }

        .swarm-step.active {
            background: var(--accent-purple);
        }

        .swarm-voter-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .voter-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent-purple);
        }

        .vote-progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }

        .vote-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            transition: width 0.5s ease;
        }

        .consensus-banner {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(61, 220, 151, 0.1);
            border: 1px solid rgba(61, 220, 151, 0.2);
            border-radius: 8px;
            color: var(--accent-green);
            font-weight: 700;
            margin-top: 10px;
        }

        .metadata-pill {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            margin-right: 4px;
            margin-bottom: 4px;
            color: var(--text-muted);
        }

        .expand-row {
            cursor: pointer;
        }

        .details-content {
            background: #080a0e;
            padding: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #79c0ff;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Minimalist View Toggles */
        .view-toggles {
            display: flex;
            background: var(--glass-bg);
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--card-border);
            margin-bottom: 24px;
            width: fit-content;
        }

        .toggle-btn {
            padding: 8px 24px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .toggle-btn:hover:not(.active) {
            color: var(--text-main);
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        .swarm-card.active::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-purple);
        }

        .empty-hub {
            grid-column: 1 / -1;
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            border: 1px dashed var(--card-border);
            border-radius: var(--radius-md);
            font-size: 14px;
        }

        /* Hub Layout */
        .incident-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
            animation: fadeIn 0.8s ease-out;
        }

        .swarm-hub {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            backdrop-filter: blur(12px);
        }

        .hub-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .hub-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-purple);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .swarm-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Swarm Card Enhancement */
        .swarm-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .swarm-card:hover {
            border-color: var(--accent-purple);
            background: rgba(168, 85, 247, 0.05);
            transform: translateY(-2px);
        }

        .swarm-card.completed {
            border-left: 4px solid var(--accent-green);
        }

        .swarm-card.active {
            border-left: 4px solid var(--accent-purple);
        }

        .card-target {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .card-status {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .card-footer {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Override Scrollbar */
        .swarm-cards-container::-webkit-scrollbar {
            width: 6px;
        }

        .swarm-cards-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .swarm-cards-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        @media (max-width: 1000px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🛡️ <span>SANDS</span> Incident View</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="text-align: right;">
                    <div style="font-size: 13px; font-weight: 600; color: white;">{{ user }}</div>
                    <div style="font-size: 11px; color: var(--accent-blue); text-transform: uppercase;">{{ role }}
                        Access</div>
                </div>
                <a href="/dashboard" class="back-btn" style="white-space: nowrap;">← Back to Dashboard</a>
                <a href="/logout" class="back-btn"
                    style="background: rgba(255,107,107,0.1); color: var(--accent-red); border: 1px solid rgba(255,107,107,0.2);">Logout</a>
            </div>
        </header>

        <section class="controls">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input"
                    placeholder="Search incidents by description, device ID, IP, or metadata...">
            </div>
            <div class="filters">
                <select id="sourceFilter" class="filter-select">
                    <option value="">All Sources</option>
                    <option value="agent">Agent</option>
                    <option value="ids">IDS</option>
                    <option value="server">Server</option>
                </select>
                <select id="severityFilter" class="filter-select">
                    <option value="">All Severities</option>
                    <option value="INFO">Info</option>
                    <option value="WARNING">Warning</option>
                    <option value="ERROR">Error</option>
                    <option value="CRITICAL">Critical</option>
                </select>
                <select id="categoryFilter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="Network">Network</option>
                    <option value="Swarm">Swarm</option>
                    <option value="Detection">Detection</option>
                    <option value="System">System</option>
                    <option value="Error">Error</option>
                </select>
            </div>
        </section>

        <div class="view-toggles" id="viewToggles">
            <button class="toggle-btn active" onclick="switchView('log')">Operational Log</button>
            <button class="toggle-btn" onclick="switchView('swarm')">Swarm Intelligence</button>
        </div>

        <div class="incident-grid">
            <!-- Regular Log Area -->
            <section class="table-container view-section active" id="logSection">
                <div class="hub-header" style="padding: 20px 24px 0 24px;">
                    <div class="hub-title" style="color: var(--accent-blue);">
                        <span>📜</span> Operational Event Log
                    </div>
                </div>
                <table id="incidentTable">
                    <thead>
                        <tr>
                            <th onclick="sort('timestamp')">Timestamp</th>
                            <th onclick="sort('source')">Source</th>
                            <th onclick="sort('severity')">Severity</th>
                            <th onclick="sort('category')">Category</th>
                            <th>Description & Metadata</th>
                        </tr>
                    </thead>
                    <tbody id="incidentList">
                        <!-- Incidents will be injected here -->
                    </tbody>
                </table>
            </section>

            <!-- Swarm Reserved Area -->
            <section class="swarm-hub view-section" id="swarmSection">
                <div class="hub-header">
                    <div class="hub-title">
                        <span>🧬</span> Swarm Intelligence Hub
                    </div>
                    <div id="swarmStats" style="font-size: 12px; color: var(--text-muted);">
                        0 Active Lifecycles
                    </div>
                </div>
                <div class="swarm-cards-container" id="swarmCards">
                    <!-- Swarm cards will be injected here -->
                </div>
            </section>
        </div>
    </div>

    <script>
        let allIncidents = [];
        let filteredIncidents = [];
        let sortConfig = { key: 'timestamp', direction: 'desc' };
        let currentView = 'log';

        function switchView(view) {
            currentView = view;

            // Update buttons
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(view));
            });

            // Update sections
            document.getElementById('logSection').classList.toggle('active', view === 'log');
            document.getElementById('swarmSection').classList.toggle('active', view === 'swarm');

            // Re-render
            renderIncidents();
        }

        async function fetchIncidents() {
            try {
                const response = await fetch('/api/incidents');
                allIncidents = await response.json();
                applyFilters();
            } catch (error) {
                console.error('Failed to fetch incidents:', error);
            }
        }

        function renderIncidents() {
            const tbody = document.getElementById('incidentList');
            const swarmContainer = document.getElementById('swarmCards');
            const statsDisplay = document.getElementById('swarmStats');

            tbody.innerHTML = '';
            swarmContainer.innerHTML = '';

            // Group swarm events by target
            const swarmGroups = {};
            allIncidents.forEach(inc => {
                if (inc.category === 'Swarm' && (inc.metadata.target || inc.metadata.device)) {
                    const target = inc.metadata.target || inc.metadata.device;
                    if (!swarmGroups[target]) swarmGroups[target] = [];
                    swarmGroups[target].push(inc);
                }
            });

            // Render Swarm Cards
            const targets = Object.keys(swarmGroups).sort((a, b) => {
                const tsA = new Date(swarmGroups[a][0].timestamp.replace(',', '.'));
                const tsB = new Date(swarmGroups[b][0].timestamp.replace(',', '.'));
                return tsB - tsA;
            });

            targets.forEach(target => {
                const group = swarmGroups[target];
                const hasVoteReq = group.some(g => g.description.includes('VOTE_REQ'));
                const castVotes = group.filter(g => g.description.includes('VOTE_CAST_RECEIVED'));
                const consensus = group.find(g => g.description.includes('CONSENSUS_REACHED'));
                const applied = group.find(g => g.description.includes('CONSENSUS_APPLIED'));

                let progress = 0;
                let voteStr = '0/0';
                let voteDetails = '';
                if (castVotes.length > 0) {
                    const meta = castVotes[0].metadata;
                    if (meta.votes_block !== undefined && meta.total_agents !== undefined) {
                        const blocks = parseInt(meta.votes_block) || 0;
                        const abstains = parseInt(meta.votes_abstain) || 0;
                        const total = parseInt(meta.total_agents) || 1;
                        const castTotal = blocks + abstains;

                        progress = (castTotal / total) * 100;
                        voteStr = `${castTotal}/${total}`;
                        voteDetails = `<span style="color: var(--accent-red)">${blocks} Block</span> / <span style="color: var(--text-muted)">${abstains} Abstain</span>`;
                    } else if (meta.votes) {
                        const vMatch = meta.votes.split('/');
                        if (vMatch.length === 2) {
                            progress = (parseInt(vMatch[0]) / parseInt(vMatch[1])) * 100;
                            voteStr = meta.votes;
                            voteDetails = `<span style="color: var(--accent-red)">${vMatch[0]} Block</span>`;
                        }
                    }
                }

                const status = applied ? 'FINALIZED' : (consensus ? 'DECIDED' : (castVotes.length > 0 ? 'VOTING' : 'TRIGGERED'));
                const statusColor = applied ? 'var(--accent-green)' : (consensus ? 'var(--accent-yellow)' : 'var(--accent-purple)');

                const card = document.createElement('div');
                card.className = `swarm-card ${applied ? 'completed' : 'active'}`;
                card.innerHTML = `
                    <div class="card-target">${target}</div>
                    <div class="card-status" style="color: ${statusColor}">${status}</div>
                    
                    <div class="swarm-lifecycle">
                        <div class="swarm-step active" title="Triggered"></div>
                        <div class="swarm-step ${castVotes.length > 0 ? 'active' : ''}" title="Voting"></div>
                        <div class="swarm-step ${consensus ? 'active' : ''}" title="Decided"></div>
                        <div class="swarm-step ${applied ? 'active' : ''}" title="Applied"></div>
                    </div>

                    <div class="vote-progress-container" style="height: 6px; margin: 12px 0 4px 0;">
                        <div class="vote-progress-bar" style="width: ${progress}%"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 9px; color: var(--text-muted); margin-bottom: 12px;">
                        <span>Quorum Participation (${voteDetails || '0 Block'})</span>
                        <span>${voteStr} Votes</span>
                    </div>

                    ${consensus ? `
                        <div style="font-size: 11px; font-weight: 600; color: var(--text-main); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
                            Decision: <span style="color: ${statusColor}">${consensus.metadata.decision}</span>
                        </div>
                    ` : ''}

                    <div class="card-footer">
                        <span>Started: ${group[group.length - 1].timestamp.split(' ')[1]}</span>
                        <span>Latest: ${group[0].timestamp.split(' ')[1]}</span>
                    </div>
                `;
                swarmContainer.appendChild(card);
            });

            statsDisplay.innerText = `${targets.length} Managed Lifecycles`;

            // Render non-swarm incidents in table
            filteredIncidents.filter(inc => inc.category !== 'Swarm').forEach((inc, index) => {
                const tr = document.createElement('tr');
                tr.className = 'expand-row';
                tr.onclick = (e) => toggleDetails(index, e);

                const severityClass = `sev-${inc.severity.toLowerCase()}`;
                const sourceClass = `source-${inc.source.toLowerCase()}`;
                const categoryClass = `cat-${inc.category.toLowerCase()}`;

                let metadataHtml = '';
                for (const [key, value] of Object.entries(inc.metadata)) {
                    if (value) metadataHtml += `<span class="metadata-pill">${key}:${value}</span>`;
                }

                tr.innerHTML = `
                    <td class="ts-col">${inc.timestamp}</td>
                    <td><span class="source-tag ${sourceClass}">${inc.source}</span></td>
                    <td><span class="severity-badge ${severityClass}">${inc.severity}</span></td>
                    <td>
                        <span class="category-dot ${categoryClass}"></span>
                        ${inc.category}
                    </td>
                    <td>
                        <div style="font-weight: 600; margin-bottom: 4px;">${inc.description}</div>
                        <div>${metadataHtml}</div>
                    </td>
                `;
                tbody.appendChild(tr);

                const detailTr = document.createElement('tr');
                detailTr.id = `detail-${index}`;
                detailTr.style.display = 'none';
                detailTr.innerHTML = `
                    <td colspan="5" class="details-content">
                        <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">RAW EVENT DATA</div>
                        ${JSON.stringify(inc, null, 2)}
                    </td>
                `;
                tbody.appendChild(detailTr);
            });
        }

        function toggleDetails(index, event) {
            const detailRow = document.getElementById(`detail-${index}`);
            if (detailRow.style.display === 'none') {
                detailRow.style.display = 'table-row';
            } else {
                detailRow.style.display = 'none';
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const source = document.getElementById('sourceFilter').value;
            const severity = document.getElementById('severityFilter').value;
            const category = document.getElementById('categoryFilter').value;

            filteredIncidents = allIncidents.filter(inc => {
                const searchMatch = !searchTerm ||
                    inc.description.toLowerCase().includes(searchTerm) ||
                    JSON.stringify(inc.metadata).toLowerCase().includes(searchTerm) ||
                    inc.source.toLowerCase().includes(searchTerm);

                const sourceMatch = !source || inc.source === source;
                const severityMatch = !severity || inc.severity === severity;
                const categoryMatch = !category || inc.category === category;

                return searchMatch && sourceMatch && severityMatch && categoryMatch;
            });

            sortData();
            renderIncidents();
        }

        function sort(key) {
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }
            sortData();
            renderIncidents();
        }

        function sortData() {
            filteredIncidents.sort((a, b) => {
                let valA = a[sortConfig.key];
                let valB = b[sortConfig.key];

                if (sortConfig.key === 'timestamp') {
                    valA = new Date(valA.replace(',', '.'));
                    valB = new Date(valB.replace(',', '.'));
                }

                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('sourceFilter').addEventListener('change', applyFilters);
        document.getElementById('severityFilter').addEventListener('change', applyFilters);
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);

        // Initial Load
        fetchIncidents();
        // Auto refresh every 10 seconds
        setInterval(fetchIncidents, 10000);
    </script>
</body>

</html>

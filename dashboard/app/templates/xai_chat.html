<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAI Chat | SANDS SOC</title>
    <link rel="stylesheet" href="/static/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #0c0f14;
            --bg-canvas: #0f131a;
            --card-bg: rgba(21, 26, 35, 0.9);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #e8ebf1;
            --text-muted: #9aa3b2;
            --accent-blue: #4f8cff;
            --accent-green: #3ddc97;
            --accent-red: #ff6b6b;
            --accent-purple: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-soft: 0 12px 40px rgba(0, 0, 0, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at top right, #1a2030, var(--bg-main));
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow: hidden;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Ensure container doesn't scroll */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
        }

        h1 span {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: var(--glass-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-blue);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* This is key for the fixed space */
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(16px);
        }

        #chatHistory {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        #chatHistory::-webkit-scrollbar {
            width: 6px;
        }

        #chatHistory::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 16px 24px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            position: relative;
            animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-blue), #2563eb);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* Markdown Styles in AI Messages */
        .ai-content {
            overflow-wrap: break-word;
        }

        .ai-content p {
            margin-bottom: 12px;
        }

        .ai-content p:last-child {
            margin-bottom: 0;
        }

        .ai-content ul,
        .ai-content ol {
            margin: 12px 0 12px 20px;
        }

        .ai-content li {
            margin-bottom: 6px;
        }

        .ai-content code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            color: #79c0ff;
        }

        .ai-content pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 16px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ai-content pre code {
            background: transparent;
            padding: 0;
            color: #d1d5db;
        }

        .ai-content strong {
            color: white;
            font-weight: 600;
        }

        .ai-content h1,
        .ai-content h2,
        .ai-content h3 {
            margin: 20px 0 10px 0;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .ai-content blockquote {
            border-left: 3px solid var(--accent-blue);
            background: rgba(79, 140, 255, 0.05);
            padding: 10px 20px;
            margin: 12px 0;
            border-radius: 0 4px 4px 0;
            font-style: italic;
        }

        /* Input Area */
        .input-area {
            padding: 24px 30px;
            background: rgba(0, 0, 0, 0.25);
            border-top: 1px solid var(--card-border);
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-md);
            padding: 14px 24px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.1);
        }

        .send-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn:hover:not(:disabled) {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            background: var(--text-muted);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 24px;
            margin: 0 30px 10px 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-muted);
            display: none;
            flex-shrink: 0;
        }

        /* Loading Dots */
        .dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 4px;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: dotPulse 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .ai-banner {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-blue);
            margin-bottom: 8px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-banner::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-blue);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🤖 <span>SANDS</span> XAI Chat</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="text-align: right;">
                    <div style="font-size: 13px; font-weight: 600;">{{ user }}</div>
                    <div style="font-size: 11px; color: var(--accent-blue); text-transform: uppercase;">{{ role }}
                        Access</div>
                </div>
                <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
                <a href="/logout" class="back-btn"
                    style="background: rgba(255,107,107,0.1); color: var(--accent-red); border: 1px solid rgba(255,107,107,0.2);">Logout</a>
            </div>
        </header>

        <main class="chat-container">
            <div id="chatHistory">
                <div class="message ai-message">
                    <div class="ai-banner">SANDS AI Analyst</div>
                    <div class="ai-content">
                        Hello! I am your security analyst assistant. I have access to the latest system logs and swarm
                        activity. How can I help you analyze the system today?
                    </div>
                </div>
            </div>

            <div id="typingIndicator" class="typing-indicator">
                SANDS AI is analyzing logs
                <span class="dots">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </span>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" class="chat-input"
                    placeholder="Ask about recent threats, swarm activity, or blocked devices..." autofocus>
                <button id="sendBtn" class="send-btn">
                    Ask AI
                </button>
            </div>
        </main>
    </div>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Configure marked options
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false,
            mangle: false
        });

        let messageHistory = [];

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message to UI
            addMessage('user', message);
            userInput.value = '';

            // Show typing indicator
            typingIndicator.style.display = 'block';
            scrollToBottom();

            // Disable input
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/xai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        history: messageHistory
                    })
                });

                const data = await response.json();

                // Add AI response to UI
                addMessage('ai', data.response);

                // Update message history
                messageHistory.push({ role: 'user', content: message });
                messageHistory.push({ role: 'assistant', content: data.response });

                // Keep history reasonable
                if (messageHistory.length > 20) messageHistory = messageHistory.slice(-20);

            } catch (error) {
                addMessage('ai', "I encountered an error while trying to communicate with the analysis engine. Please ensure the backend is running and GROQ_API_KEY is configured.");
            } finally {
                typingIndicator.style.display = 'none';
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                scrollToBottom();
            }
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;

            if (role === 'ai') {
                const banner = document.createElement('div');
                banner.className = 'ai-banner';
                banner.textContent = 'SANDS AI Analyst';
                div.appendChild(banner);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'ai-content';
                contentDiv.innerHTML = marked.parse(content);
                div.appendChild(contentDiv);
            } else {
                div.textContent = content;
            }

            chatHistory.appendChild(div);
            scrollToBottom();
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>

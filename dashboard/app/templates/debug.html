<!DOCTYPE html>
<html>

<head>
    <title>SANDS Debug Operations</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --bg-main: #0c0f14;
            --card-bg: #151a23;
            --accent-blue: #4f8cff;
            --accent-red: #ff6b6b;
            --accent-yellow: #f6c343;
            --accent-green: #3ddc97;
            --text-main: #e8ebf1;
            --radius-lg: 16px;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 40px;
        }

        .debug-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .btn-benign {
            background: rgba(61, 220, 151, 0.15);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .btn-suspicious {
            background: rgba(246, 195, 67, 0.15);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }

        .btn-attack {
            background: rgba(255, 107, 107, 0.15);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .btn-primary {
            background: rgba(79, 140, 255, 0.15);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            background: #090c10;
            border: 1px solid #2d333b;
            border-radius: 6px;
            color: white;
            margin-bottom: 15px;
        }

        .log-panel {
            margin-top: 40px;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .log-entry {
            margin-bottom: 4px;
        }

        .log-ts {
            color: #666;
        }

        .log-success {
            color: var(--accent-green);
        }

        .log-error {
            color: var(--accent-red);
        }
    </style>
</head>

<body>
    <div class="debug-container">
        <div class="header">
            <h1>🛠️ SANDS System Debug</h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="text-align: right;">
                    <div style="font-size: 13px; font-weight: 600;">{{ user }}</div>
                    <div style="font-size: 11px; color: var(--accent-blue); text-transform: uppercase;">{{ role }}
                        Access</div>
                </div>
                <button class="btn btn-primary" onclick="window.location='/dashboard'">← Back to Dashboard</button>
                <a href="/logout" class="btn btn-attack" style="text-decoration: none; padding: 10px 16px;">Logout</a>
            </div>
        </div>

        <div class="card" style="margin-bottom: 24px;">
            <h2>Target Device Selection</h2>
            <div style="display: flex; gap: 20px; align-items: flex-end;">
                <div style="flex: 1;">
                    <label style="display:block; font-size:12px; margin-bottom:5px;">Select Active Device</label>
                    <select id="deviceSelect" onchange="updateSelectedDevice()">
                        <option value="">-- No Devices Loaded --</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-size:12px; margin-bottom:5px;">Manual Device ID (Override)</label>
                    <input type="text" id="manualDeviceId" placeholder="e.g. agent-001">
                </div>
                <button class="btn btn-primary" style="height:42px; margin-bottom:15px;" onclick="refreshDevices()">🔄
                    Refresh</button>
            </div>
        </div>

        <div class="grid">
            <!-- ML DETECTIONS -->
            <div class="card">
                <h2>ML Detections (Simulation)</h2>
                <div class="btn-group">
                    <button class="btn btn-benign" onclick="triggerML('BENIGN', 0.001)">🟢 Inject BENIGN Flow</button>
                    <button class="btn btn-suspicious" onclick="triggerML('SUSPICIOUS', 0.45)">🟡 Trigger SUSPICIOUS
                        (ML)</button>
                    <button class="btn btn-attack" onclick="triggerML('ATTACK', 0.98)">🔴 Trigger ATTACK (ML)</button>
                </div>
            </div>

            <!-- SWARM & CONSENSUS -->
            <div class="card">
                <h2>Swarm & Consensus</h2>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="triggerSwarmAlert('ANOM_BEHAV', 15.5)">🚨 Broadcast ANOMALY
                        Alert</button>
                    <button class="btn btn-suspicious" onclick="triggerVote()">🗳️ Start VOTE_REQUEST</button>
                    <button class="btn btn-attack" onclick="triggerConsensus()">🔒 Force CONSENSUS (BLOCK)</button>
                </div>
            </div>

            <!-- SYSTEM MOCKS -->
            <div class="card">
                <h2>System Registry</h2>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="mockRegister()">👤 Mock NEW Agent Registration</button>
                </div>
            </div>
        </div>

        <div class="log-panel" id="debugLog">
            <div class="log-entry"><span class="log-ts">[SYSTEM]</span> Debug log initialized. Ready for operations.
            </div>
        </div>
    </div>

    <script>
        let currentDeviceId = "";

        async function refreshDevices() {
            try {
                const res = await fetch('/api/state');
                const data = await res.json();
                const select = document.getElementById('deviceSelect');
                select.innerHTML = '<option value="">-- Select a Device --</option>';

                data.devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.key;
                    opt.textContent = `${d.key} (${d.ip || 'no ip'})`;
                    select.appendChild(opt);
                });

                log("Successfully refreshed device list", "success");
            } catch (e) {
                log("Failed to refresh devices: " + e, "error");
            }
        }

        function getTarget() {
            const manual = document.getElementById('manualDeviceId').value.trim();
            if (manual) return manual;
            return document.getElementById('deviceSelect').value;
        }

        function log(msg, type = "") {
            const panel = document.getElementById('debugLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const ts = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-ts">[${ts}]</span> <span class="log-${type}">${msg}</span>`;
            panel.prepend(entry);
        }

        async function callTrigger(action, targetId, payload = {}) {
            if (!targetId && action !== 'mock_register') {
                log("ERROR: No target device selected", "error");
                return;
            }

            try {
                const res = await fetch('/api/debug/trigger', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, target_id: targetId, payload })
                });
                const data = await res.json();
                if (res.ok) {
                    log(`${action.toUpperCase()} triggered: ${data.message || 'Success'}`, "success");
                } else {
                    log(`FAILED: ${data.detail || 'Unknown error'}`, "error");
                }
            } catch (e) {
                log("Network error: " + e, "error");
            }
        }

        function triggerML(decision, score) {
            callTrigger('ml_detection', getTarget(), { decision, score });
        }

        function triggerSwarmAlert(code, score) {
            callTrigger('swarm_alert', getTarget(), { code, score });
        }

        function triggerVote() {
            callTrigger('vote_request', getTarget(), { target_type: 'device' });
        }

        function triggerConsensus() {
            callTrigger('consensus', getTarget(), { target_type: 'device', action: 'BLOCK' });
        }

        async function mockRegister() {
            const res = await fetch('/api/debug/trigger', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'mock_register', payload: { ip: '10.0.0.99', mac: 'AA:BB:CC:DD:EE:FF' } })
            });
            const data = await res.json();
            log(`Mock registration complete: ${data.device_id}`, "success");
            refreshDevices();
        }

        // Initialize
        refreshDevices();

        // Polling if needed
        // setInterval(refreshDevices, 10000);
    </script>
</body>

</html>

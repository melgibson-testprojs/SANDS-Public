<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>SANDS – Agent Topology</title>

  <!-- Vis Network ie  Graph Library -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    /* ===============================
       Global Page Styling
       =============================== */
    body {
      margin: 0;
      padding: 0;
      background: #0b0f1a;
      color: #eaeaea;
      font-family: "Inter", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #11162a;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-info h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #4f8cff;
    }

    .header-info span {
      font-size: 12px;
      color: #888;
    }

    .back-btn {
      color: #aaa;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 12px;
      border: 1px solid #333;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: #1a1f35;
      color: #fff;
    }

    /* ===============================
       Main Layout
       =============================== */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    #graph {
      flex: 1;
      width: 100%;
      height: 100%;
    }

    /* ===============================
       Legend
       =============================== */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(15, 20, 35, 0.9);
      padding: 14px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid #222;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .legend-title {
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .dot.physical {
      background: #4f8cff;
      border-radius: 2px;
    }

    .dot.secure {
      background: #3ddc97;
    }

    .dot.warning {
      background: #f59e0b;
    }

    .dot.critical {
      background: #ff4d4d;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-info">
      <h2>SANDS – Agent Topology</h2>
      <span>Real-time swarm infrastructure mapping</span>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
      <div style="text-align: right;">
        <div style="font-size: 13px; font-weight: 600;">{{ user }}</div>
        <div style="font-size: 11px; color: #4f8cff; text-transform: uppercase;">{{ role }} Access</div>
      </div>
      <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
      <a href="/logout" class="back-btn" style="border-color: #ff4d4d; color: #ff4d4d;">Logout</a>
    </div>
  </header>

  <main>
    <div id="graph"></div>

    <div class="legend">
      <div class="legend-title">Legend</div>
      <div class="legend-item">
        <div class="dot physical"></div> Physical Agent
      </div>
      <div class="legend-item">
        <div class="dot secure"></div> Secure Device
      </div>
      <div class="legend-item">
        <div class="dot warning"></div> Elevated Risk
      </div>
      <div class="legend-item">
        <div class="dot critical"></div> Critical Threat
      </div>
    </div>
  </main>

  <script>
    let network = null;
    let nodes = new vis.DataSet();
    let edges = new vis.DataSet();

    const container = document.getElementById("graph");

    const options = {
      nodes: {
        font: { color: '#ffffff', size: 12 },
        borderWidth: 2,
      },
      edges: {
        color: '#444',
        arrows: { to: { enabled: true, scaleFactor: 0.5 } }
      },
      physics: {
        stabilization: false,
        barnesHut: {
          gravitationalConstant: -2000,
          springLength: 100
        }
      }
    };

    network = new vis.Network(container, { nodes, edges }, options);

    async function loadTopology() {
      try {
        const res = await fetch("/api/topology");
        const data = await res.json();

        const nodeItems = data.nodes.map(n => {
          let color = "#3ddc97"; // Default secure
          let shape = "dot";
          let risk = parseFloat(n.risk || 0);

          if (n.type === "physical") {
            color = "#4f8cff";
            shape = "box";
          } else {
            // Risk-based coloring
            if (risk > 0.7) color = "#ff4d4d";
            else if (risk > 0.3) color = "#f59e0b";
          }

          return {
            id: n.id,
            label: n.id.length > 15 ? n.id.substring(0, 7) + "..." : n.id,
            shape: shape,
            color: {
              background: color,
              border: "#111"
            },
            title: `ID: ${n.id}\nRisk: ${risk.toFixed(2)}\nIP: ${n.ip || 'N/A'}`
          };
        });

        const edgeItems = data.edges.map(e => ({
          from: e.from,
          to: e.to,
          arrows: "to"
        }));

        // Re-populate data sets
        nodes.clear();
        edges.clear();
        nodes.add(nodeItems);
        edges.add(edgeItems);

      } catch (err) {
        console.error("Topology load failed", err);
      }
    }

    // Set interval for live updates
    loadTopology();
    setInterval(loadTopology, 5000);
  </script>

</body>

</html>

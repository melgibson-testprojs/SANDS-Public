<!DOCTYPE html>
<html>

<head>
  <title>SwarmSec SOC Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <h1>🛡️ SwarmSec SOC Dashboard</h1>

  <div id="cards" style="display:flex;gap:20px;flex-wrap:wrap;"></div>

  <script>
    async function fetchState() {
      const res = await fetch("/api/state");
      const data = await res.json();

      const container = document.getElementById("cards");
      container.innerHTML = "";

      data.devices.forEach(d => {
        const card = document.createElement("a");
        card.href = `/soc/${encodeURIComponent(d.key)}`;
        card.style.textDecoration = "none";
        card.style.color = "inherit";

        card.innerHTML = `
          <div style="
            border:1px solid #444;
            padding:20px;
            width:220px;
            border-radius:10px;
            background:#111;">
            <h3>${d.key}</h3>
            <p>Status: <strong>${d.status}</strong></p>
            <p>IP: ${d.ip || "-"}</p>
            <p>MAC: ${d.mac || "unknown"}</p>
          </div>
        `;

        container.appendChild(card);
      });
    }

    // initial load
    fetchState();

    // poll every 5 seconds
    setInterval(fetchState, 5000);
  </script>

</body>

</html>

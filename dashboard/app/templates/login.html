<!DOCTYPE html>
<html>

<head>
    <title>SANDS SOC Login</title>
    <style>
        :root {
            --bg-main: #0c0f14;
            --card-bg: #151a23;
            --accent-blue: #4f8cff;
            --text-main: #e8ebf1;
            --radius-lg: 16px;
        }

        body {
            background: radial-gradient(circle at center, #1a2030, var(--bg-main));
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-lg);
            width: 360px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        h1 span {
            color: var(--accent-blue);
        }

        p {
            color: #9aa3b2;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #090c10;
            border: 1px solid #2d333b;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>🛡️ <span>SANDS</span> SOC</h1>
        <p>Central Intelligence Access</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="admin / viewer">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Authenticate</button>
            <div id="errorMsg" class="error">Invalid credentials. Access denied.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = "Connection error.";
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>

</html>
